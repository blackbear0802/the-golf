<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>08 · 동행 매칭</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
:root{--p:#163028;--pd:#0d1f19;--a:#c9a227;--as:#e4c46a;--s:#fff;--bg:#f8f6f1;--pa:#faf8f3;--g50:#f6f5f1;--g100:#eae8e0;--g200:#d9d6cc;--g500:#6b7280;--g700:#3f4a44;--g900:#111613;--err:#dc2626;--fd:'Noto Serif KR',serif;--fb:'Pretendard','Apple SD Gothic Neo',sans-serif;--fe:'Inter',sans-serif;--rsm:4px;--rmd:8px;--rlg:12px;--rxl:16px;--rp:9999px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);min-height:100dvh;display:flex;flex-direction:column}
.screen-label{position:fixed;top:8px;right:8px;background:var(--a);color:var(--pd);font-size:10px;font-weight:700;padding:3px 9px;border-radius:var(--rp);z-index:999}
header{background:var(--p);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:100}
.header-title{font-size:16px;font-weight:600;color:#fff}
.header-btn{font-size:13px;font-weight:600;color:var(--a);background:none;border:1px solid var(--a);padding:6px 14px;border-radius:var(--rp);cursor:pointer}

/* 필터 */
.filter-row{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;background:var(--s);border-bottom:1px solid var(--g100)}
.filter-row::-webkit-scrollbar{display:none}
.fchip{font-size:12px;color:var(--g700);background:var(--s);border:1.5px solid var(--g200);padding:6px 14px;border-radius:var(--rp);white-space:nowrap;cursor:pointer}
.fchip.active{background:var(--p);color:#fff;border-color:var(--p)}

/* 그룹 카드 */
.group-list{padding:12px 16px 80px;display:flex;flex-direction:column;gap:12px}

.group-card{background:var(--s);border-radius:var(--rxl);overflow:hidden;box-shadow:0 1px 2px rgba(22,48,40,.06),0 2px 8px rgba(22,48,40,.04)}
.gc-top{padding:14px;display:flex;gap:12px}
.gc-img{width:56px;height:56px;border-radius:var(--rmd);background:linear-gradient(135deg,#1a6b3a,#163028);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.gc-info{flex:1}
.gc-title{font-size:14px;font-weight:600;color:var(--g900);margin-bottom:3px}
.gc-meta{font-size:12px;color:var(--g500);margin-bottom:6px}
.gc-date{font-size:13px;color:var(--g700);font-weight:500}

/* 멤버 아바타 행 */
.gc-members{padding:0 14px 12px;display:flex;align-items:center;gap:8px}
.member-avatar{width:32px;height:32px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;color:var(--a);font-size:11px;font-weight:700}
.member-empty{width:32px;height:32px;border-radius:50%;border:2px dashed var(--g200);display:flex;align-items:center;justify-content:center;color:var(--g200);font-size:16px}
.member-count{font-size:12px;color:var(--g500);margin-left:4px}

/* 핸디캡 + 참가 버튼 */
.gc-footer{padding:10px 14px;background:var(--g50);border-top:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between}
.hc-row{display:flex;align-items:center;gap:12px}
.hc-item{display:flex;flex-direction:column;align-items:center}
.hc-num{font-family:var(--fe);font-size:16px;font-weight:700;color:var(--p)}
.hc-label{font-size:10px;color:var(--g500)}
.join-btn{height:36px;padding:0 18px;background:var(--p);color:#fff;border:none;border-radius:var(--rp);font-size:13px;font-weight:600;font-family:var(--fb);cursor:pointer}
.join-btn.full{background:var(--g200);color:var(--g500);cursor:default}

/* FULL 배지 */
.full-badge{font-size:11px;font-weight:700;color:var(--g500);background:var(--g100);padding:3px 8px;border-radius:var(--rp)}

/* 빈 상태 */
.create-card{background:linear-gradient(135deg,var(--pd),var(--p));border-radius:var(--rxl);padding:24px;text-align:center;margin-bottom:12px}
.create-title{font-family:var(--fd);font-size:18px;color:#fff;margin-bottom:6px;font-weight:400}
.create-sub{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:16px}
.create-btn{background:var(--a);color:var(--pd);border:none;border-radius:var(--rp);padding:10px 24px;font-size:14px;font-weight:700;font-family:var(--fb);cursor:pointer}

nav{background:var(--s);border-top:1px solid var(--g100);height:56px;display:flex;align-items:center;padding:0 8px;position:sticky;bottom:0}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.ni span:first-child{font-size:20px;line-height:1}
.ni span:last-child{font-size:10px;color:var(--g500)}
.ni.active span:last-child{color:var(--p);font-weight:600}
</style></head><body>
<div class="screen-label">08 · 동행 매칭</div>
<header>
  <span class="header-title">동행 매칭</span>
  <button class="header-btn">+ 팀 만들기</button>
</header>

<div class="filter-row">
  <div class="fchip active">전체</div>
  <div class="fchip">🇹🇭 태국</div>
  <div class="fchip">🇻🇳 베트남</div>
  <div class="fchip">5월</div>
  <div class="fchip">1자리 남음</div>
</div>

<div class="group-list">

  <div class="create-card">
    <div class="create-title">같이 갈 팀원을 찾고 있나요?</div>
    <div class="create-sub">팀을 만들면 같은 상품에 관심 있는<br>골퍼와 자동으로 연결돼요</div>
    <button class="create-btn">+ 새 팀 만들기</button>
  </div>

  <div class="group-card">
    <div class="gc-top">
      <div class="gc-img">⛳</div>
      <div class="gc-info">
        <div class="gc-title">치앙마이 3박 4일 같이 가실 분</div>
        <div class="gc-meta">🇹🇭 태국 · 3라운드 패키지</div>
        <div class="gc-date">📅 2026년 5월 15일 출발</div>
      </div>
    </div>
    <div class="gc-members">
      <div class="member-avatar">김</div>
      <div class="member-avatar">이</div>
      <div class="member-avatar">박</div>
      <div class="member-empty">+</div>
      <span class="member-count">3/4명</span>
    </div>
    <div class="gc-footer">
      <div class="hc-row">
        <div class="hc-item"><div class="hc-num">12.4</div><div class="hc-label">평균 핸디</div></div>
        <div class="hc-item"><div class="hc-num">87</div><div class="hc-label">평균 스코어</div></div>
      </div>
      <button class="join-btn">참가 신청</button>
    </div>
  </div>

  <div class="group-card">
    <div class="gc-top">
      <div class="gc-img" style="background:linear-gradient(135deg,#1a4d6e,#0d2a40)">⛳</div>
      <div class="gc-info">
        <div class="gc-title">다낭 4박 5일 골프 동반자 모집</div>
        <div class="gc-meta">🇻🇳 베트남 · 3라운드</div>
        <div class="gc-date">📅 2026년 6월 3일 출발</div>
      </div>
    </div>
    <div class="gc-members">
      <div class="member-avatar">최</div>
      <div class="member-avatar">정</div>
      <div class="member-avatar">강</div>
      <div class="member-avatar">오</div>
      <span class="member-count">4/4명</span>
    </div>
    <div class="gc-footer">
      <div class="hc-row">
        <div class="hc-item"><div class="hc-num">8.1</div><div class="hc-label">평균 핸디</div></div>
        <div class="hc-item"><div class="hc-num">82</div><div class="hc-label">평균 스코어</div></div>
      </div>
      <button class="join-btn full">마감</button>
    </div>
  </div>

</div>

<nav>
  <div class="ni"><span>🏠</span><span>홈</span></div>
  <div class="ni"><span>🔍</span><span>탐색</span></div>
  <div class="ni"><span>📋</span><span>예약</span></div>
  <div class="ni active"><span>👥</span><span style="color:var(--p);font-weight:600">매칭</span></div>
  <div class="ni"><span>👤</span><span>나</span></div>
</nav>
</body></html>
