<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>06 · 예약 완료(대기)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
:root{--p:#163028;--pd:#0d1f19;--a:#c9a227;--as:#e4c46a;--s:#fff;--bg:#f8f6f1;--pa:#faf8f3;--g50:#f6f5f1;--g100:#eae8e0;--g200:#d9d6cc;--g500:#6b7280;--g700:#3f4a44;--g900:#111613;--err:#dc2626;--fd:'Noto Serif KR',serif;--fb:'Pretendard','Apple SD Gothic Neo',sans-serif;--fe:'Inter',sans-serif;--rsm:4px;--rmd:8px;--rlg:12px;--rxl:16px;--rp:9999px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);min-height:100dvh;display:flex;flex-direction:column}
.screen-label{position:fixed;top:8px;right:8px;background:var(--a);color:var(--pd);font-size:10px;font-weight:700;padding:3px 9px;border-radius:var(--rp);z-index:999}
header{background:var(--p);height:56px;display:flex;align-items:center;padding:0 16px}
.header-title{font-size:16px;font-weight:600;color:#fff;margin:auto}

/* 성공 배너 */
.success-banner{background:linear-gradient(135deg,var(--pd),var(--p));padding:36px 24px;text-align:center}
.success-icon{font-size:56px;margin-bottom:12px}
.success-title{font-family:var(--fd);font-size:22px;color:#fff;font-weight:400;margin-bottom:6px}
.success-sub{font-size:14px;color:rgba(255,255,255,.6)}
.booking-no{font-family:var(--fe);font-size:18px;font-weight:700;color:var(--a);margin-top:12px;letter-spacing:.08em}

/* 정보 카드 */
.info-card{background:var(--s);margin:16px;border-radius:var(--rxl);overflow:hidden;box-shadow:0 1px 2px rgba(22,48,40,.06),0 2px 8px rgba(22,48,40,.04)}
.card-header{background:var(--p);padding:12px 16px;font-size:13px;font-weight:600;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:6px}
.info-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--g100)}
.info-row:last-child{border-bottom:none}
.info-icon{font-size:20px;width:28px;flex-shrink:0}
.info-label{font-size:13px;color:var(--g500);min-width:80px}
.info-val{font-size:14px;font-weight:600;color:var(--g900);flex:1;text-align:right}

/* SLA 박스 */
.sla-box{background:#f0f9f4;border:1px solid #bbf7d0;border-radius:var(--rxl);margin:0 16px 16px;padding:16px}
.sla-title{font-size:14px;font-weight:700;color:var(--p);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.sla-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.sla-step:last-child{margin-bottom:0}
.sla-dot{width:24px;height:24px;border-radius:50%;background:var(--p);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.sla-text{font-size:13px;color:var(--g700);line-height:1.5}
.sla-time{font-size:12px;color:var(--p);font-weight:600}

/* 카카오 채널 */
.kakao-box{background:#fffde7;border:1px solid #fdd835;border-radius:var(--rxl);margin:0 16px 16px;padding:16px;display:flex;align-items:center;gap:12px}
.kakao-icon{font-size:32px;flex-shrink:0}
.kakao-text{flex:1}
.kakao-title{font-size:14px;font-weight:700;color:#391b1b;margin-bottom:2px}
.kakao-sub{font-size:12px;color:#6b5a00}
.kakao-btn{background:#fee500;border:none;border-radius:var(--rp);padding:8px 16px;font-size:13px;font-weight:700;color:#391b1b;cursor:pointer;flex-shrink:0}

/* 하단 버튼 */
.bottom-btns{padding:16px;display:flex;flex-direction:column;gap:10px;padding-bottom:32px}
.btn-primary{width:100%;height:52px;background:var(--p);color:#fff;border:none;border-radius:var(--rxl);font-size:16px;font-weight:700;font-family:var(--fb);cursor:pointer}
.btn-secondary{width:100%;height:48px;background:var(--s);border:1.5px solid var(--g200);border-radius:var(--rxl);font-size:15px;font-weight:600;color:var(--g700);font-family:var(--fb);cursor:pointer}
</style></head><body>
<div class="screen-label">06 · 예약 완료(대기)</div>
<header><span class="header-title">예약 요청 완료</span></header>

<div class="success-banner">
  <div class="success-icon">✅</div>
  <div class="success-title">예약 요청이 접수됐습니다</div>
  <div class="success-sub">담당자가 곧 연락드릴게요</div>
  <div class="booking-no"># TG-2026-043821</div>
</div>

<div class="info-card">
  <div class="card-header">📋 예약 정보</div>
  <div class="info-row"><span class="info-icon">⛳</span><span class="info-label">상품</span><span class="info-val">치앙마이 3박 4일 3R</span></div>
  <div class="info-row"><span class="info-icon">👥</span><span class="info-label">인원</span><span class="info-val">4명</span></div>
  <div class="info-row"><span class="info-icon">📅</span><span class="info-label">희망 출발</span><span class="info-val">2026년 5월 15일</span></div>
  <div class="info-row"><span class="info-icon">💰</span><span class="info-label">예상 금액</span><span class="info-val" style="color:var(--err)">356만원~</span></div>
</div>

<div class="sla-box">
  <div class="sla-title">🕐 앞으로 어떻게 되나요?</div>
  <div class="sla-step"><div class="sla-dot">1</div><div class="sla-text"><span class="sla-time">24시간 이내</span><br>담당자가 전화 또는 카카오로 연락드립니다</div></div>
  <div class="sla-step"><div class="sla-dot">2</div><div class="sla-text">일정·코스·숙소 세부 사항 확정 후 최종 금액 안내</div></div>
  <div class="sla-step"><div class="sla-dot">3</div><div class="sla-text">확정 후 입금 안내 — 이 단계에서 결제가 이루어집니다</div></div>
</div>

<div class="kakao-box">
  <div class="kakao-icon">💬</div>
  <div class="kakao-text">
    <div class="kakao-title">더 골프 카카오 채널 추가</div>
    <div class="kakao-sub">담당자 연락 + 진행 상황 빠르게 확인</div>
  </div>
  <button class="kakao-btn">채널 추가</button>
</div>

<div class="bottom-btns">
  <button class="btn-primary">예약 상태 확인하기</button>
  <button class="btn-secondary">홈으로 돌아가기</button>
</div>
</body></html>
