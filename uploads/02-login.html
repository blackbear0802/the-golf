<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>02 · 로그인/회원가입</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
:root{--p:#163028;--pd:#0d1f19;--ph:#204a3c;--a:#c9a227;--as:#e4c46a;--s:#fff;--bg:#f8f6f1;--pa:#faf8f3;--g50:#f6f5f1;--g100:#eae8e0;--g200:#d9d6cc;--g500:#6b7280;--g700:#3f4a44;--g900:#111613;--err:#dc2626;--fd:'Noto Serif KR',serif;--fb:'Pretendard','Apple SD Gothic Neo',sans-serif;--fe:'Inter',sans-serif;--rsm:4px;--rmd:8px;--rlg:12px;--rxl:16px;--rp:9999px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);min-height:100dvh;display:flex;flex-direction:column}
.screen-label{position:fixed;top:8px;right:8px;background:var(--a);color:var(--pd);font-size:10px;font-weight:700;padding:3px 9px;border-radius:var(--rp);z-index:999}

/* Header */
header{background:var(--p);height:56px;display:flex;align-items:center;padding:0 20px;gap:12px}
.back-btn{color:rgba(255,255,255,.7);font-size:22px;cursor:pointer;line-height:1}
.header-title{font-size:16px;font-weight:600;color:#fff}

/* Content */
.content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
.logo{font-family:var(--fd);color:var(--p);font-size:32px;font-weight:700;letter-spacing:.14em;margin-bottom:8px}
.tagline{font-size:14px;color:var(--g500);margin-bottom:40px;text-align:center;line-height:1.55}

/* 카카오 버튼 */
.btn-kakao{width:100%;max-width:360px;height:52px;background:#fee500;border:none;border-radius:var(--rxl);display:flex;align-items:center;justify-content:center;gap:10px;font-size:16px;font-weight:700;color:#391b1b;cursor:pointer;margin-bottom:12px}
.btn-kakao svg{width:22px;height:22px;fill:#391b1b}

/* 기타 소셜 수납 */
.other-login{width:100%;max-width:360px;display:flex;gap:10px;margin-bottom:32px}
.btn-social{flex:1;height:44px;background:var(--s);border:1.5px solid var(--g200);border-radius:var(--rxl);display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;color:var(--g700);cursor:pointer}

.divider{width:100%;max-width:360px;display:flex;align-items:center;gap:12px;margin-bottom:24px}
.divider-line{flex:1;height:1px;background:var(--g200)}
.divider-text{font-size:12px;color:var(--g500)}

/* 이메일 폼 (접기 상태 → 클릭 시 펼침) */
.form-group{width:100%;max-width:360px;margin-bottom:14px}
label{display:block;font-size:13px;font-weight:600;color:var(--g700);margin-bottom:6px}
input{width:100%;height:48px;border:1.5px solid var(--g200);border-radius:var(--rmd);padding:0 14px;font-size:15px;font-family:var(--fb);background:var(--pa);outline:none}
input:focus{border-color:var(--p)}

.btn-primary{width:100%;max-width:360px;height:52px;background:var(--p);color:#fff;border:none;border-radius:var(--rxl);font-size:16px;font-weight:700;font-family:var(--fb);cursor:pointer;margin-bottom:16px}

.legal{font-size:12px;color:var(--g500);text-align:center;line-height:1.6;max-width:300px}
.legal a{color:var(--p);text-decoration:underline}

/* 회원가입 추가 필드 (탭 전환) */
.tab-row{width:100%;max-width:360px;display:flex;border-bottom:2px solid var(--g100);margin-bottom:28px}
.tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;color:var(--g500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:var(--p);border-bottom-color:var(--p)}
</style></head><body>
<div class="screen-label">02 · 로그인/회원가입</div>

<header>
  <span class="back-btn">←</span>
  <span class="header-title">시작하기</span>
</header>

<div class="content">
  <div class="logo">THE GOLF</div>
  <p class="tagline">골프 여행의 시작<br>카카오로 3초 만에 시작하세요</p>

  <!-- 탭: 로그인 / 회원가입 -->
  <div class="tab-row">
    <div class="tab active">로그인</div>
    <div class="tab">회원가입</div>
  </div>

  <!-- 카카오 (Primary) -->
  <button class="btn-kakao">
    <svg viewBox="0 0 24 24"><path d="M12 3C6.48 3 2 6.48 2 10.8c0 2.7 1.62 5.1 4.08 6.6L5.4 21l4.5-2.4c.69.12 1.41.18 2.1.18 5.52 0 10-3.48 10-7.8S17.52 3 12 3z"/></svg>
    카카오로 계속하기
  </button>

  <!-- 기타 소셜 (수납) -->
  <div class="other-login">
    <button class="btn-social">N 네이버</button>
    <button class="btn-social">G 구글</button>
    <button class="btn-social">🍎 애플</button>
  </div>

  <div class="divider">
    <span class="divider-line"></span>
    <span class="divider-text">또는</span>
    <span class="divider-line"></span>
  </div>

  <!-- 이메일 로그인 -->
  <div class="form-group">
    <label>이메일</label>
    <input type="email" placeholder="golf@example.com">
  </div>
  <div class="form-group">
    <label>비밀번호</label>
    <input type="password" placeholder="••••••••">
  </div>

  <button class="btn-primary">로그인</button>

  <p class="legal">로그인 시 <a>이용약관</a> 및 <a>개인정보처리방침</a>에<br>동의하는 것으로 간주됩니다.</p>
</div>
</body></html>
